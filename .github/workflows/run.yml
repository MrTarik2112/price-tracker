name: Price Tracker Auto Run

on:
  schedule:
    - cron: "*/1 * * * *"  # 🔥 her 10 dakikada bir
  workflow_dispatch:        # manuel çalıştırma

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python bot.py

      - name: Commit JSON changes
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add acik.json kapali.json
          git commit -m "auto price update" || echo "no changes"
          git push
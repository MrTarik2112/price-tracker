name: Price Tracker

on:
  schedule:
    - cron: "*/10 * * * *"   # 10 dakikada bir
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install requests

      - name: Run bot
        run: python bot.py

      - name: Commit + Push ALWAYS
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"

          git add -A

          git commit -m "auto update $(date)" || echo "no changes"

          git pull --rebase origin main || true

          git push origin main
name: Price Tracker Cloud

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python bot.py

      - name: Commit changes
        run: |
          git config user.name "price-bot"
          git config user.email "bot@github.com"
          git add acik.json kapali.json || true
          git commit -m "price update $(date)" || echo "no changes"
          git push || echo "no changes"
name: Price Tracker Bot

on:
  schedule:
    - cron: "*/10 * * * *"   # 🔥 her 10 dakikada bir
  workflow_dispatch:         # manuel çalıştırma

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        run: python bot.py

      - name: Commit changes
        run: |
          git config user.name "price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "update price" || echo "no changes"
          git push